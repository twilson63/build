services:
  - type: web
    name: build
    runtime: static
    envVars:
      - key: GLEAM_VERSION
        value: 1.16.0
    buildCommand: |
      set -euo pipefail
      mkdir -p .render/bin
      curl -fsSL "https://github.com/gleam-lang/gleam/releases/download/v${GLEAM_VERSION}/gleam-v${GLEAM_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
        | tar -xz -C .render/bin gleam
      chmod +x .render/bin/gleam
      export PATH="$PWD/.render/bin:$PATH"
      gleam --version
      npm ci
      mkdir -p node_modules/.bin
      ln -sf "$PWD/.render/bin/gleam" node_modules/.bin/gleam
      npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: require-corp
